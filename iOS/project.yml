name: Regrenew
options:
  bundleIdPrefix: com.shimondeitel.regrenew
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Regrenew:
    type: application
    platform: iOS
    sources:
      - path: Regrenew
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.regrenew
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Regrenew/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RegrenewTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RegrenewTests
      - path: Regrenew.storekit
    dependencies:
      - target: Regrenew
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.regrenew.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RegrenewUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RegrenewUITests
    dependencies:
      - target: Regrenew
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.regrenew.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Regrenew:
    build:
      targets:
        Regrenew: all
        RegrenewTests: [test]
        RegrenewUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Regrenew.storekit
    test:
      config: Debug
      storeKitConfiguration: Regrenew.storekit
      targets:
        - RegrenewTests
        - RegrenewUITests
    archive:
      config: Release
